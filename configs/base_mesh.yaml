# =============================================================================
# 베이스 GLB 전용 — 과일 몸체 하나만 (꼭지·다중 오브젝트 없음)
# =============================================================================
# UV 구(primitive_uv_sphere)는 극 근처 메쉬가 눈에 띄어 기본 도형 데모에 부적합.
# 기본값은 아이코스피어(삼각형이 더 균일). 필요 시 아래 primitive 만 변경.
#
# 빌드:  python scripts/build_base_mesh.py
# 산출:  output_dir 아래 {asset_name}.glb (기본 assets/glb/)
# =============================================================================

output_dir: assets/glb

defaults:
  primitive: icosphere
  radius: 1.0
  # 위치는 항상 원점 근처 단일 오브젝트

material:
  base_color: [0.9, 0.42, 0.12, 1.0]
  roughness: 0.55
  specular_ior_level: 0.35

# 세 베이스: tangerine_0/1/2 — 서로 다른 subdiv/스케일로 실루엣·면 밀도를 구분합니다.
exports:
  - asset_name: tangerine_0
    primitive: icosphere
    subdivisions: 3
    scale: [0.52, 0.52, 0.46]

  - asset_name: tangerine_1
    primitive: icosphere
    subdivisions: 4
    scale: [0.46, 0.46, 0.42]

  - asset_name: tangerine_2
    primitive: icosphere
    subdivisions: 2
    scale: [0.54, 0.50, 0.48]
