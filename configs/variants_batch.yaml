# =============================================================================
# 변종 GLB 배치 — 병해 재질 × 크기 × 찌그러짐 × 높이 (generate_variants.py)
# =============================================================================
# 선행 조건: 베이스 3개 GLB (기본 경로 아래에 직접 두거나 build_base_mesh 로 생성)
# 실행:      python scripts/generate_variants_build.py --config configs/variants_batch.yaml
# =============================================================================

glb_sources:
  - name: tangerine_0
    path: assets/glb/tangerine_0.glb
  - name: tangerine_1
    path: assets/glb/tangerine_1.glb
  - name: tangerine_2
    path: assets/glb/tangerine_2.glb

output_dir: outputs/_variant_glb

random_seed: 42

size_variants:
  auto_generate: true
  count: 3
  min: 0.75
  max: 1.25

height_variants:
  auto_generate: true
  count: 3
  min: 0.75
  max: 1.25

squish_variants:
  - label: mild
    scale_xy: 1.04
    scale_z: 0.94
  - label: medium
    scale_xy: 1.09
    scale_z: 0.87
  - label: strong
    scale_xy: 1.15
    scale_z: 0.80

disease_params:

  healthy:
    base_color: [0.85, 0.35, 0.05, 1.0]
    roughness: 0.22
    specular: 0.50

  black_spot:
    base_color: [0.80, 0.32, 0.04, 1.0]
    spot_color: [0.05, 0.02, 0.01, 1.0]
    spot_scale: 35.0
    spot_threshold: 0.12
    bump_strength: 0.40
    bump_noise_scale: 80.0

  canker:
    base_color: [0.78, 0.30, 0.04, 1.0]
    lesion_color: [0.28, 0.12, 0.03, 1.0]
    halo_color: [0.90, 0.78, 0.10, 1.0]
    lesion_scale: 8.0
    bump_strength: 0.70
    bump_distance: 0.012

  greening:
    orange_color: [0.82, 0.32, 0.04, 1.0]
    green_color: [0.12, 0.35, 0.04, 1.0]
    mottle_scale: 6.0
    green_bottom_ratio: 0.45

  scab:
    base_color: [0.72, 0.28, 0.04, 1.0]
    scab_color: [0.35, 0.22, 0.10, 1.0]
    scab_scale: 18.0
    bump_strength: 0.90
    bump_distance: 0.018
    wart_roughness: 0.92
