# =============================================================================
# 변종 GLB — 원본 healthy 재질 유지 + 틴트 증강 + 병해 알베도 오버레이
# =============================================================================
# 조합(현재): 베이스 GLB 3개 × 병해 5종(healthy + 4) = 15
#   — 크기/찌그러짐/높이/색 축은 1값만 두어 형태·틴트는 기본값 고정
# 실행: python scripts/generate_variants_build.py
# =============================================================================

glb_sources:
  - name: tangerine0
    path: data/Tangerine_3D/glb/tangerine0.glb
  - name: tangerine1
    path: data/Tangerine_3D/glb/tangerine1.glb
  - name: tangerine2
    path: data/Tangerine_3D/glb/tangerine2.glb

# 루트 outputs/_variant_glb — 탐색기에서 자주 여는 경로와 일치 (루트 /outputs/ 는 .gitignore)
output_dir: outputs/_variant_glb

# 파일 수가 줄었으므로 베이크 해상도 상향 여지 (뷰어용 알베도 품질)
gltf_bake_size: 2048

random_seed: 42

# 짧은 파일명: tangerine0__black_spot.glb (full 이면 s/q/h/c 접미사 포함).
# short 는 축이 각 1값일 때만 유효(여러 조합이면 full 사용).
output_name_style: short

# 기본 스케일·형태 (다시 그리드 쓰려면 값·항목을 늘리면 됨)
size_variants:
  values: [1.0]

height_variants:
  values: [1.0]

squish_variants:
  - label: neutral
    scale_xy: 1.0
    scale_z: 1.0

# 원본 알베도에 곱하는 RGB (단일 프로파일 = 틴트 고정)
color_variants:
  - label: neutral
    rgb_mul: [1.0, 1.0, 1.0, 1.0]
    roughness_mul: 1.0

disease_params:

  healthy:
    base_color: [0.85, 0.35, 0.05, 1.0]
    roughness: 0.22
    specular: 0.50

  black_spot:
    # 큰 반점 + 부드러운 경계(격자/쪼개짐 완화) + 진한 색
    voronoi_scale: 88.0
    voronoi_smooth: 0.9
    voronoi_randomness: 0.9
    spot_dist_map_max: 0.24
    spot_ramp_pos: 0.34
    spot_ramp_interpolation: LINEAR
    spot_mix_boost: 1.28
    spot_color_hex: "#0C0806"
    spot_dark_hex: "#040201"
    overlay_bump_strength: 0.11
    spot_rough: 0.88

  canker:
    lesion_scale: 25.0
    canker_de_span: 0.28
    canker_overlay_in: 0.0
    canker_overlay_out: 0.38
    overlay_strength: 0.82
    disp_scale: 1.0

  greening:
    mottle_scale: 2.4
    greening_noise_scale: 7.5
    mottle_ramp_lo: 0.14
    mottle_ramp_hi: 0.85
    roughness: 0.48
    overlay_strength: 0.96
    greening_boost: 1.45
    green_tint_hex: "#267030"
    greening_yellow_hex: "#A4C060"
    greening_olive_hex: "#4A7D3E"
    greening_orange_hex: "#E88A28"

  scab:
    scab_noise_a_scale: 22.0
    scab_noise_b_scale: 15.0
    scab_mask_pos: 0.72
    scab_disp_scale: 0.005
    overlay_strength: 0.72
